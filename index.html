  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Barlow Condensed';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"20594911-da3e-4889-aa48-9c2199065216\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --navy:      #0D2235;\n    --blue:      #29ABE2;\n    --gold:      #F7A823;\n    --magenta:   #EC1C7B;\n    --green:     #39B54A;\n    --teal:      #1B9A8A;\n    --teal-lite: #E8F4F8;\n    --rule:      #D0D8E0;\n    --body-text: #2C3E50;\n    --line:      #B0BEC8;\n    --white:     #ffffff;\n    --bg:        #F5F7FA;\n  }\n\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    font-family: 'Barlow', sans-serif;\n    background: var(--bg);\n    color: var(--body-text);\n    min-height: 100vh;\n  }\n\n  /* ── HEADER ── */\n  .site-header {\n    background: var(--navy);\n    padding: 0 40px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    height: 76px;\n    position: relative;\n  }\n  .site-header::after {\n    content: '';\n    position: absolute;\n    bottom: -4px; left: 0; right: 0;\n    height: 4px;\n    background: var(--blue);\n  }\n  .logo-block {\n    display: flex;\n    flex-direction: column;\n    gap: 1px;\n  }\n  .logo-img {\n    height: 34px;\n    width: auto;\n    display: block;\n  }\n  .logo-img-footer {\n    height: 24px;\n  }\n  .logo-doxa {\n    display: flex;\n    align-items: center;\n    gap: 0;\n    line-height: 1;\n  }\n  .logo-doxa span {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-weight: 800;\n    font-size: 36px;\n    letter-spacing: -1px;\n  }\n  .logo-doxa .d { color: var(--blue); }\n  .logo-doxa .o { color: var(--gold); }\n  .logo-doxa .x { color: var(--magenta); }\n  .logo-doxa .a { color: var(--green); }\n  .logo-doxa .reg {\n    font-size: 13px;\n    color: var(--white);\n    align-self: flex-start;\n    margin-top: 4px;\n    margin-left: 1px;\n  }\n  .logo-tagline {\n    font-size: 11px;\n    font-weight: 600;\n    color: rgba(255,255,255,0.75);\n    letter-spacing: 0.5px;\n    text-transform: uppercase;\n  }\n  .header-contact {\n    text-align: right;\n  }\n  .header-contact p {\n    font-size: 11px;\n    font-weight: 700;\n    color: rgba(255,255,255,0.7);\n    text-transform: uppercase;\n    letter-spacing: 0.5px;\n  }\n  .header-contact .header-email {\n    display: block;\n    font-size: 13px;\n    font-weight: 700;\n    color: var(--blue);\n    margin-top: 2px;\n    letter-spacing: 0.3px;\n    cursor: default;\n    user-select: all;\n  }\n  .header-contact a {\n    display: block;\n    font-size: 13px;\n    font-weight: 700;\n    color: var(--blue);\n    text-decoration: none;\n    margin-top: 2px;\n  }\n  .header-contact .phone {\n    font-size: 12px;\n    color: rgba(255,255,255,0.85);\n    font-weight: 400;\n    margin-top: 1px;\n  }\n\n  /* ── HERO TITLE ── */\n  .hero {\n    background: var(--white);\n    border-bottom: 1px solid var(--rule);\n    padding: 48px 0 36px;\n  }\n  .container {\n    max-width: 760px;\n    margin: 0 auto;\n    padding: 0 32px;\n  }\n  .hero h1 {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 48px;\n    font-weight: 800;\n    line-height: 1.05;\n    color: var(--navy);\n    text-transform: uppercase;\n    letter-spacing: -0.5px;\n  }\n  .hero h1 .accent { color: var(--blue); }\n  .hero .subtitle {\n    font-size: 15px;\n    color: var(--teal);\n    font-weight: 600;\n    margin-top: 8px;\n    letter-spacing: 0.2px;\n  }\n  .hero-divider {\n    height: 3px;\n    background: var(--blue);\n    margin: 20px 0;\n    border-radius: 2px;\n  }\n  .hero-intro {\n    font-size: 15px;\n    line-height: 1.65;\n    color: var(--body-text);\n  }\n  .callout {\n    background: var(--teal-lite);\n    border-left: 5px solid var(--blue);\n    border-radius: 4px;\n    padding: 14px 18px;\n    margin-top: 20px;\n    font-style: italic;\n    font-size: 14px;\n    line-height: 1.6;\n    color: var(--navy);\n  }\n\n  /* ── FORM BODY ── */\n  .form-body {\n    padding: 40px 0 60px;\n  }\n\n  /* Candidate info block */\n  .candidate-block {\n    background: var(--white);\n    border: 1px solid var(--rule);\n    border-radius: 8px;\n    padding: 28px 32px;\n    margin-bottom: 32px;\n  }\n  .candidate-block h2 {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 13px;\n    font-weight: 800;\n    text-transform: uppercase;\n    letter-spacing: 1px;\n    color: var(--teal);\n    margin-bottom: 18px;\n  }\n  .field-row {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 16px;\n  }\n  .field-row.single { grid-template-columns: 1fr; }\n  .field-row.triple { grid-template-columns: 1fr 1fr 1fr; }\n  .field-group {\n    display: flex;\n    flex-direction: column;\n    gap: 6px;\n  }\n  .field-group label {\n    font-size: 12px;\n    font-weight: 700;\n    text-transform: uppercase;\n    letter-spacing: 0.5px;\n    color: var(--navy);\n  }\n  .field-group label .req { color: var(--magenta); margin-left: 2px; }\n  input[type=\"text\"],\n  input[type=\"email\"],\n  input[type=\"tel\"],\n  textarea {\n    width: 100%;\n    padding: 10px 14px;\n    border: 1.5px solid var(--rule);\n    border-radius: 5px;\n    font-family: 'Barlow', sans-serif;\n    font-size: 14px;\n    color: var(--body-text);\n    background: var(--white);\n    transition: border-color 0.2s, box-shadow 0.2s;\n    outline: none;\n  }\n  input:focus, textarea:focus {\n    border-color: var(--blue);\n    box-shadow: 0 0 0 3px rgba(41,171,226,0.15);\n  }\n  input.error, textarea.error { border-color: var(--magenta); }\n\n  /* ── PART SECTIONS ── */\n  .part-header {\n    background: var(--navy);\n    border-radius: 6px;\n    padding: 10px 16px;\n    margin-bottom: 20px;\n  }\n  .part-header h2 {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 13px;\n    font-weight: 800;\n    text-transform: uppercase;\n    letter-spacing: 1.5px;\n    color: var(--white);\n  }\n\n  .question-card {\n    background: var(--white);\n    border: 1px solid var(--rule);\n    border-radius: 8px;\n    padding: 28px 32px;\n    margin-bottom: 20px;\n  }\n  .question-card + .question-card { }\n  .q-label {\n    font-size: 11px;\n    font-weight: 800;\n    text-transform: uppercase;\n    letter-spacing: 1px;\n    color: var(--blue);\n    margin-bottom: 4px;\n  }\n  .q-title {\n    font-size: 17px;\n    font-weight: 700;\n    color: var(--navy);\n    margin-bottom: 12px;\n    line-height: 1.3;\n  }\n  .q-body {\n    font-size: 14px;\n    line-height: 1.65;\n    color: var(--body-text);\n    margin-bottom: 18px;\n  }\n  .q-body p + p { margin-top: 10px; }\n  .answer-area textarea {\n    resize: vertical;\n    min-height: 90px;\n  }\n  .answer-label {\n    font-size: 11px;\n    font-weight: 700;\n    text-transform: uppercase;\n    letter-spacing: 0.5px;\n    color: var(--teal);\n    margin-bottom: 8px;\n    display: block;\n  }\n\n  /* ── T/F TOGGLES ── */\n  .tf-table {\n    width: 100%;\n    border-collapse: collapse;\n    border-radius: 6px;\n    overflow: hidden;\n    border: 1px solid var(--rule);\n    margin-bottom: 18px;\n  }\n  .tf-row { display: flex; align-items: stretch; }\n  .tf-row:nth-child(odd) { background: var(--teal-lite); }\n  .tf-row:nth-child(even) { background: var(--white); }\n  .tf-row + .tf-row { border-top: 1px solid var(--rule); }\n  .tf-cell-toggle {\n    padding: 14px 16px;\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    min-width: 120px;\n    border-right: 1px solid var(--rule);\n  }\n  .tf-cell-text {\n    padding: 14px 16px;\n    font-size: 13.5px;\n    line-height: 1.55;\n    display: flex;\n    align-items: center;\n    flex: 1;\n    color: var(--body-text);\n  }\n  .toggle-group {\n    display: flex;\n    gap: 6px;\n  }\n  .toggle-btn {\n    width: 38px;\n    height: 30px;\n    border: 2px solid var(--rule);\n    border-radius: 4px;\n    background: var(--white);\n    font-family: 'Barlow', sans-serif;\n    font-size: 12px;\n    font-weight: 800;\n    color: var(--line);\n    cursor: pointer;\n    transition: all 0.15s;\n    letter-spacing: 0.5px;\n  }\n  .toggle-btn:hover { border-color: var(--blue); color: var(--blue); }\n  .toggle-btn.active-T { background: var(--navy); border-color: var(--navy); color: var(--white); }\n  .toggle-btn.active-F { background: var(--magenta); border-color: var(--magenta); color: var(--white); }\n\n  /* ── CHECKBOXES ── */\n  .check-list { display: flex; flex-direction: column; gap: 10px; }\n  .check-item {\n    display: flex;\n    align-items: flex-start;\n    gap: 12px;\n    padding: 10px 14px;\n    border: 1.5px solid var(--rule);\n    border-radius: 6px;\n    cursor: pointer;\n    transition: border-color 0.15s, background 0.15s;\n  }\n  .check-item:hover { border-color: var(--blue); background: var(--teal-lite); }\n  .check-item.checked {\n    border-color: var(--blue);\n    background: var(--teal-lite);\n  }\n  .check-item input[type=\"checkbox\"] { display: none; }\n  .check-box {\n    width: 18px;\n    height: 18px;\n    min-width: 18px;\n    border: 2px solid var(--blue);\n    border-radius: 3px;\n    background: var(--white);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    margin-top: 1px;\n    transition: background 0.15s;\n  }\n  .check-item.checked .check-box {\n    background: var(--blue);\n  }\n  .check-box svg { display: none; }\n  .check-item.checked .check-box svg { display: block; }\n  .check-text {\n    font-size: 14px;\n    line-height: 1.5;\n    color: var(--body-text);\n    user-select: none;\n  }\n\n  /* ── SECTION DIVIDER ── */\n  .section-gap { height: 32px; }\n\n  /* ── SUBMIT SECTION ── */\n  .submit-section {\n    background: var(--white);\n    border: 1px solid var(--rule);\n    border-radius: 8px;\n    padding: 32px 32px;\n    margin-top: 12px;\n  }\n  .submit-callout {\n    background: var(--teal-lite);\n    border-left: 5px solid var(--teal);\n    border-radius: 4px;\n    padding: 14px 18px;\n    margin-bottom: 24px;\n    font-style: italic;\n    font-size: 14px;\n    line-height: 1.6;\n    color: var(--navy);\n  }\n  .next-steps-title {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 13px;\n    font-weight: 800;\n    text-transform: uppercase;\n    letter-spacing: 1.5px;\n    color: var(--navy);\n    margin-bottom: 10px;\n  }\n  .submit-section p {\n    font-size: 14px;\n    line-height: 1.65;\n    color: var(--body-text);\n    margin-bottom: 10px;\n  }\n  .submit-section p a {\n    color: var(--blue);\n    font-weight: 600;\n    text-decoration: none;\n  }\n  .submit-section p a:hover { text-decoration: underline; }\n  .submit-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    background: var(--navy);\n    color: var(--white);\n    border: none;\n    border-radius: 6px;\n    padding: 14px 32px;\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 16px;\n    font-weight: 800;\n    text-transform: uppercase;\n    letter-spacing: 1px;\n    cursor: pointer;\n    margin-top: 20px;\n    transition: background 0.2s, transform 0.15s;\n  }\n  .submit-btn:hover { background: var(--blue); transform: translateY(-1px); }\n  .submit-btn:active { transform: translateY(0); }\n  .submit-btn:disabled { background: var(--line); cursor: not-allowed; transform: none; }\n  .submit-btn .arrow { font-size: 18px; }\n\n  /* ── STATUS MESSAGES ── */\n  .status-msg {\n    display: none;\n    padding: 14px 18px;\n    border-radius: 6px;\n    font-size: 14px;\n    font-weight: 600;\n    margin-top: 16px;\n  }\n  .status-msg.success {\n    display: block;\n    background: #E8F6EE;\n    border-left: 5px solid var(--green);\n    color: #1A6632;\n  }\n  .status-msg.error-msg {\n    display: block;\n    background: #FEE8F0;\n    border-left: 5px solid var(--magenta);\n    color: #8B0033;\n  }\n\n  /* ── SUCCESS SCREEN ── */\n  .success-screen {\n    display: none;\n    text-align: center;\n    padding: 60px 32px;\n  }\n  .success-screen .checkmark {\n    width: 64px; height: 64px;\n    background: var(--green);\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    margin: 0 auto 24px;\n    font-size: 32px;\n  }\n  .success-screen h2 {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 32px;\n    font-weight: 800;\n    text-transform: uppercase;\n    color: var(--navy);\n    margin-bottom: 12px;\n  }\n  .success-screen p {\n    font-size: 15px;\n    line-height: 1.65;\n    color: var(--body-text);\n    max-width: 480px;\n    margin: 0 auto 20px;\n  }\n  .success-screen a.book-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    background: var(--blue);\n    color: var(--white);\n    text-decoration: none;\n    padding: 14px 28px;\n    border-radius: 6px;\n    font-family: 'Barlow Condensed', sans-serif;\n    font-weight: 800;\n    font-size: 15px;\n    text-transform: uppercase;\n    letter-spacing: 1px;\n    margin-top: 8px;\n    transition: background 0.2s;\n  }\n  .success-screen a.book-btn:hover { background: var(--navy); }\n\n  /* ── FOOTER ── */\n  .site-footer {\n    background: var(--navy);\n    padding: 20px 40px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-top: 60px;\n  }\n  .site-footer .logo-doxa span { font-size: 24px; }\n  .site-footer .logo-tagline { color: rgba(255,255,255,0.5); font-size: 10px; }\n  .footer-right {\n    font-size: 13px;\n    font-weight: 700;\n    color: rgba(255,255,255,0.85);\n    text-align: right;\n  }\n  .footer-right a { color: var(--blue); text-decoration: none; }\n\n  /* ── CONFIG BANNER (shown when tokens not set) ── */\n  .config-banner {\n    background: #FFF3CD;\n    border: 2px solid #F7A823;\n    border-radius: 6px;\n    padding: 14px 20px;\n    margin-bottom: 24px;\n    font-size: 13px;\n    color: #7D5A00;\n    line-height: 1.6;\n  }\n  .config-banner strong { color: #5A3E00; }\n  .config-banner code {\n    background: rgba(0,0,0,0.08);\n    padding: 1px 5px;\n    border-radius: 3px;\n    font-size: 12px;\n  }\n\n  /* ── RESPONSIVE ── */\n  @media (max-width: 600px) {\n    .field-row, .field-row.triple { grid-template-columns: 1fr; }\n    .site-header { padding: 0 20px; height: auto; padding-top: 14px; padding-bottom: 14px; }\n    .hero h1 { font-size: 34px; }\n    .container { padding: 0 20px; }\n    .question-card, .candidate-block, .submit-section { padding: 22px 20px; }\n    .tf-cell-toggle { min-width: 90px; }\n    .site-footer { flex-direction: column; gap: 12px; text-align: center; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ══════════════════════════════════════════════════════\n     CONFIGURATION — Fill these in before sharing the link\n     ══════════════════════════════════════════════════════ -->\n<script>\nconst CONFIG = {\n  // ── EmailJS ──────────────────────────────────────────────────────────────\n  // Sign up free at https://www.emailjs.com\n  // Create a service (Gmail works), create an email template, copy IDs below\n  EMAILJS_PUBLIC_KEY:   'lAVECSVIDfk3IW1cd',   // Account > API Keys\n  EMAILJS_SERVICE_ID:   'service_w3u9huv',   // Email Services\n  EMAILJS_TEMPLATE_ID:  'template_as29h9s',  // Email Templates\n\n  // ── ClientTether ─────────────────────────────────────────────────────────\n  // Found in ClientTether > Settings > API tab (Enterprise level)\n  CT_ACCESS_TOKEN: '',\n  CT_WEB_KEY:      '',\n  // Optional: set an action plan ID to auto-enroll new leads\n  CT_ACTION_PLAN_ID: '',\n  // Optional: lead source ID for tracking\n  CT_LEAD_SOURCE_ID: '',\n\n  // ── Zapier Webhook (recommended — avoids CORS browser restriction) ────────\n  // Create a free Zap: Webhooks by Zapier (Catch Hook) → ClientTether (Create Contact)\n  // Paste the Zapier webhook URL here instead of using CT directly\n  ZAPIER_WEBHOOK: '',\n\n  // ── Recipient ────────────────────────────────────────────────────────────\n  TO_EMAIL: 'damon@doxafranchising.com',\n};\n\nconst CONFIGURED =\n  CONFIG.EMAILJS_PUBLIC_KEY.trim().length > 0 &&\n  CONFIG.EMAILJS_SERVICE_ID.trim().length > 0 &&\n  CONFIG.EMAILJS_TEMPLATE_ID.trim().length > 0;\n<\u002Fscript>\n\n<!-- ══════════════════════════════════════════════════════ -->\n\n\n\n<!-- HEADER -->\n<header class=\"site-header\">\n  <div class=\"logo-block\">\n    <img src=\"39a28a2e-353c-44f3-a3d3-9bec8c66a3ce\" alt=\"DOXA\" class=\"logo-img\">\n  <\u002Fdiv>\n  <div class=\"header-contact\">\n    <p>To learn more, contact<\u002Fp>\n    <span class=\"header-email\" aria-label=\"franchise at doxatalent dot com\">FRANCHISE<span>@<\u002Fspan>DOXATALENT.COM<\u002Fspan>\n    <p class=\"phone\">☎ 208-609-9255<\u002Fp>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- HERO -->\n<div class=\"hero\">\n  <div class=\"container\">\n    <h1>Is a DOXA Franchise <span class=\"accent\">For<\u002Fspan> You?<\u002Fh1>\n    <div class=\"subtitle\">A Candidate Readiness Guide<\u002Fdiv>\n    <div class=\"hero-divider\"><\u002Fdiv>\n    <p class=\"hero-intro\">This guide isn't a formal application. It's a thinking tool. The questions on these pages are the same ones we'll work through on our first call – so the more honest you are here, the better that conversation gets.<\u002Fp>\n    <div class=\"callout\">There are no right answers that get you in and no wrong answers that keep you out. What matters is that your answers are real.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FORM -->\n<div class=\"form-body\">\n  <div class=\"container\">\n\n    <!-- Config warning banner -->\n    <div class=\"config-banner\" id=\"configBanner\" style=\"display:none;\">\n      <strong>⚙️ Setup required before sharing this form.<\u002Fstrong><br>\n      Open the HTML file and fill in the <code>CONFIG<\u002Fcode> block at the top:<br>\n      • <strong>EmailJS:<\u002Fstrong> Sign up at <a href=\"https://emailjs.com\" target=\"_blank\">emailjs.com<\u002Fa> (free) → get your Public Key, Service ID, and Template ID.<br>\n      • <strong>ClientTether:<\u002Fstrong> Go to Settings → API tab in your CT account → copy your X-Access-Token and X-Web-Key.<br>\n      Once filled in, this banner disappears and the form is live.\n    <\u002Fdiv>\n\n    <form id=\"readinessForm\" novalidate=\"\">\n\n      <!-- ── CANDIDATE INFO ── -->\n      <div class=\"candidate-block\">\n        <h2>Your Information<\u002Fh2>\n        <div class=\"field-row\">\n          <div class=\"field-group\">\n            <label>First Name <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <input type=\"text\" id=\"firstName\" name=\"firstName\" placeholder=\"First name\" required=\"\">\n          <\u002Fdiv>\n          <div class=\"field-group\">\n            <label>Last Name <span class=\"req\">*<\u002Fspan><\u002Flabel>\n            <input type=\"text\" id=\"lastName\" name=\"lastName\" placeholder=\"Last name\" required=\"\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ══════════════════════════════════════════════\n           PART ONE — THE MINDSET\n      ══════════════════════════════════════════════ -->\n      <div class=\"part-header\">\n        <h2>Part One — The Mindset<\u002Fh2>\n      <\u002Fdiv>\n\n      <p style=\"font-size:14px; line-height:1.65; margin-bottom:20px; color:var(--body-text);\">\n        The hardest part of this decision has nothing to do with the business model. It has everything to do with whether you've actually made up your mind to stop being an employee.\n      <\u002Fp>\n\n      <!-- Q1 -->\n      <div class=\"question-card\">\n        <div class=\"q-label\">Question 1<\u002Fdiv>\n        <div class=\"q-title\">Have you closed the door on employment?<\u002Fdiv>\n        <div class=\"q-body\">\n          <p>Think about this one carefully: if a recruiter called you tomorrow with a strong offer – good title, solid comp, interesting company – what would you do?<\u002Fp>\n          <p>The people who build strong businesses here have already answered that question. They're done hedging. They've made the decision to own their future. If you haven't gotten there yet, that's okay – but it does mean the timing probably isn't right to move into our discovery process.<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"answer-label\">Your answer<\u002Fspan>\n        <div class=\"answer-area\">\n          <textarea id=\"q1\" name=\"q1\" placeholder=\"Write your honest answer here...\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Q2 -->\n      <div class=\"question-card\">\n        <div class=\"q-label\">Question 2<\u002Fdiv>\n        <div class=\"q-title\">What's actually driving your desire for business ownership?<\u002Fdiv>\n        <div class=\"q-body\">\n          <p>Skip the polished answer. Is it autonomy? Income ceiling? Legacy? A specific frustration with where you've been? Something you're trying to build?<\u002Fp>\n          <p>The sharper your answer, the more resilient you'll be in those early months when the business is still taking shape and the results haven't shown up yet.<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"answer-label\">Your answer<\u002Fspan>\n        <div class=\"answer-area\">\n          <textarea id=\"q2\" name=\"q2\" placeholder=\"Write your honest answer here...\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Q3 — T/F -->\n      <div class=\"question-card\">\n        <div class=\"q-label\">Question 3<\u002Fdiv>\n        <div class=\"q-title\">Are you comfortable being early?<\u002Fdiv>\n        <div class=\"q-body\">\n          <p>The franchisees who thrive inside an emerging brand like DOXA see “early” as an advantage. They want direct access to the people running the company. They have opinions about what's working, and they expect those opinions to carry weight. They're building something – they're not just operating something.<\u002Fp>\n          <p>If that sounds like you, these should be straightforward:<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"tf-table\">\n          <div class=\"tf-row\" data-tf=\"tf1\">\n            <div class=\"tf-cell-toggle\">\n              <div class=\"toggle-group\">\n                <button type=\"button\" class=\"toggle-btn\" data-val=\"T\">T<\u002Fbutton>\n                <button type=\"button\" class=\"toggle-btn\" data-val=\"F\">F<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tf-cell-text\">When I've been part of something early-stage, my instinct was to lean in and help shape it – not wait for someone to hand me a playbook.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tf-row\" data-tf=\"tf2\">\n            <div class=\"tf-cell-toggle\">\n              <div class=\"toggle-group\">\n                <button type=\"button\" class=\"toggle-btn\" data-val=\"T\">T<\u002Fbutton>\n                <button type=\"button\" class=\"toggle-btn\" data-val=\"F\">F<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tf-cell-text\">Having a direct voice with leadership matters more to me than having a fully documented system to follow.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tf-row\" data-tf=\"tf3\">\n            <div class=\"tf-cell-toggle\">\n              <div class=\"toggle-group\">\n                <button type=\"button\" class=\"toggle-btn\" data-val=\"T\">T<\u002Fbutton>\n                <button type=\"button\" class=\"toggle-btn\" data-val=\"F\">F<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"tf-cell-text\">I can work through ambiguity, knowing my experience and feedback will help improve the process for everyone who comes after me.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <input type=\"hidden\" id=\"tf1\" name=\"tf1\" value=\"\">\n        <input type=\"hidden\" id=\"tf2\" name=\"tf2\" value=\"\">\n        <input type=\"hidden\" id=\"tf3\" name=\"tf3\" value=\"\">\n      <\u002Fdiv>\n\n      <!-- ══════════════════════════════════════════════\n           PART TWO — THE REALITY CHECK\n      ══════════════════════════════════════════════ -->\n      <div class=\"section-gap\"><\u002Fdiv>\n      <div class=\"part-header\">\n        <h2>Part Two — The Reality Check<\u002Fh2>\n      <\u002Fdiv>\n\n      <p style=\"font-size:14px; line-height:1.65; margin-bottom:20px; color:var(--body-text);\">\n        This is where it gets practical. Building a DOXA franchise requires consistent, full-time effort – especially in the first 6 to 12 months. The go-to-market strategy is relationship-based: networking events, coffee meetings, activating your professional contacts. That work doesn't happen in leftover hours.\n      <\u002Fp>\n\n      <!-- Q4 -->\n      <div class=\"question-card\">\n        <div class=\"q-label\">Question 4<\u002Fdiv>\n        <div class=\"q-title\">Do you have the financial runway?<\u002Fdiv>\n        <div class=\"q-body\">\n          <p>We mean actually mapped out – living expenses, personal obligations, plus the investment itself.<\u002Fp>\n          <p>Write out the reality: what do you need monthly to cover your life? How many months can you sustain that without income from the business?<\u002Fp>\n          <p>The franchisees who've built the strongest businesses went in with that number mapped out and their eyes open. They didn't assume the business would ramp faster than it did – and they weren't caught off guard when it didn't.<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"answer-label\">Your answer<\u002Fspan>\n        <div class=\"answer-area\">\n          <textarea id=\"q4\" name=\"q4\" placeholder=\"Monthly needs, runway months, savings available...\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Q5 -->\n      <div class=\"question-card\">\n        <div class=\"q-label\">Question 5<\u002Fdiv>\n        <div class=\"q-title\">What does your support system look like?<\u002Fdiv>\n        <div class=\"q-body\">\n          <p>Is your partner, spouse, or family genuinely behind this? We're talking truly behind it – not tolerating it. Do the people closest to you understand what the first year looks like, and are they in?<\u002Fp>\n          <p>Building a business is hard enough on its own. Building one while managing tension at home is a different challenge entirely.<\u002Fp>\n        <\u002Fdiv>\n        <span class=\"answer-label\">Your answer<\u002Fspan>\n        <div class=\"answer-area\">\n          <textarea id=\"q5\" name=\"q5\" placeholder=\"Write your honest answer here...\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ══════════════════════════════════════════════\n           PART THREE — THE HONEST QUESTION\n      ══════════════════════════════════════════════ -->\n      <div class=\"section-gap\"><\u002Fdiv>\n      <div class=\"part-header\">\n        <h2>Part Three — The Honest Question<\u002Fh2>\n      <\u002Fdiv>\n\n      <p style=\"font-size:14px; line-height:1.65; margin-bottom:20px; color:var(--body-text);\">\n        This is the one most people skip. Work through it anyway.\n      <\u002Fp>\n\n      <!-- Q6 — Checkboxes -->\n      <div class=\"question-card\">\n        <div class=\"q-label\">Question 6<\u002Fdiv>\n        <div class=\"q-title\">What's been in the way?<\u002Fdiv>\n        <div class=\"q-body\">\n          <p>Most first-time entrepreneurs don't lack the skills or the drive. What slows them down is FUD: fear, uncertainty, and doubt. It shows up right when things get real, and it follows a remarkably consistent pattern across people who eventually build great businesses.<\u002Fp>\n          <p>Which of these have kept you from owning a business before now? <em>Select all that apply.<\u002Fem><\u002Fp>\n        <\u002Fdiv>\n        <div class=\"check-list\">\n          <div class=\"check-item\" role=\"checkbox\" tabindex=\"0\">\n            <input type=\"checkbox\" name=\"fud\" value=\"Fear of failure and what it would mean for how others see me\">\n            <div class=\"check-box\">\n              <svg width=\"11\" height=\"9\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4L4 7.5L10 1\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <span class=\"check-text\">Fear of failure and what it would mean for how others see me<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"check-item\" role=\"checkbox\" tabindex=\"0\">\n            <input type=\"checkbox\" name=\"fud\" value=\"Uncertainty about whether I can replace my current income\">\n            <div class=\"check-box\">\n              <svg width=\"11\" height=\"9\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4L4 7.5L10 1\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <span class=\"check-text\">Uncertainty about whether I can replace my current income<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"check-item\" role=\"checkbox\" tabindex=\"0\">\n            <input type=\"checkbox\" name=\"fud\" value=\"Doubt that I have what it takes to sell or build a client base\">\n            <div class=\"check-box\">\n              <svg width=\"11\" height=\"9\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4L4 7.5L10 1\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <span class=\"check-text\">Doubt that I have what it takes to sell or build a client base<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"check-item\" role=\"checkbox\" tabindex=\"0\">\n            <input type=\"checkbox\" name=\"fud\" value=\"Gaps in my confidence around running a business operationally\">\n            <div class=\"check-box\">\n              <svg width=\"11\" height=\"9\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4L4 7.5L10 1\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <span class=\"check-text\">Gaps in my confidence around running a business operationally<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"check-item\" role=\"checkbox\" tabindex=\"0\">\n            <input type=\"checkbox\" name=\"fud\" value=\"Concern that the timing isn't right in my personal life\">\n            <div class=\"check-box\">\n              <svg width=\"11\" height=\"9\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4L4 7.5L10 1\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <span class=\"check-text\">Concern that the timing isn't right in my personal life<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"check-item\" role=\"checkbox\" tabindex=\"0\">\n            <input type=\"checkbox\" name=\"fud\" value=\"Worry about what happens if I invest and it doesn't work out\">\n            <div class=\"check-box\">\n              <svg width=\"11\" height=\"9\" viewBox=\"0 0 11 9\" fill=\"none\"><path d=\"M1 4L4 7.5L10 1\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n            <span class=\"check-text\">Worry about what happens if I invest and it doesn't work out<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ══════════════════════════════════════════════\n           WHAT COMES NEXT + SUBMIT\n      ══════════════════════════════════════════════ -->\n      <div class=\"section-gap\"><\u002Fdiv>\n      <div class=\"submit-section\">\n        <div class=\"next-steps-title\" style=\"background:var(--navy); color:white; padding:10px 16px; border-radius:5px; margin-bottom:20px;\">What Comes Next<\u002Fdiv>\n        <div class=\"submit-callout\">There's no wrong answer here. Knowing which ones are loudest for you helps us make that first conversation actually useful.<\u002Fdiv>\n        <p>If you worked through these questions and you still want to talk – that's a good sign. It means you went through the hard part of this with your eyes open. That's exactly the kind of person we want across the table from us.<\u002Fp>\n        <p>Our first conversation is a real conversation about whether a DOXA franchise makes sense for your life, your goals, and your timeline. We'll ask you hard questions. We expect you to come with hard ones of your own.<\u002Fp>\n\n        <button type=\"submit\" class=\"submit-btn\" id=\"submitBtn\">\n          Submit My Answers <span class=\"arrow\">→<\u002Fspan>\n        <\u002Fbutton>\n\n        <div class=\"status-msg\" id=\"statusMsg\"><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fform>\n\n    <!-- SUCCESS SCREEN -->\n    <div class=\"success-screen\" id=\"successScreen\">\n      <div class=\"checkmark\">✓<\u002Fdiv>\n      <h2>You're In The Queue<\u002Fh2>\n      <p>Your answers have been submitted and your information is in our system. We'll reach out within one business day to schedule your first conversation.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FOOTER -->\n<footer class=\"site-footer\">\n  <div class=\"logo-block\">\n    <img src=\"39a28a2e-353c-44f3-a3d3-9bec8c66a3ce\" alt=\"DOXA\" class=\"logo-img logo-img-footer\">\n  <\u002Fdiv>\n  <div class=\"footer-right\">\n    DOXA® &nbsp;|&nbsp; <a href=\"https://doxafranchising.com\" target=\"_blank\">DOXAfranchising.com<\u002Fa>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- EmailJS SDK -->\n<script src=\"444f7e72-3a11-4801-aab9-9e9cabe67658\" defer=\"\"><\u002Fscript>\n\n<script>\nwindow.addEventListener('load', function() {\n\n  // ── Config banner ─────────────────────────────────────────────────────────\n  if (!CONFIGURED) {\n    document.getElementById('configBanner').style.display = 'block';\n  }\n\n  // ── EmailJS init (guarded so a load failure won't crash the whole script) ──\n  if (CONFIG.EMAILJS_PUBLIC_KEY && CONFIG.EMAILJS_PUBLIC_KEY.trim().length > 0) {\n    try { emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY); }\n    catch(e) { console.warn('EmailJS not loaded:', e); }\n  }\n\n  // ── T/F toggle buttons ────────────────────────────────────────────────────\n  var tfValues = { tf1: '', tf2: '', tf3: '' };\n\n  document.querySelectorAll('.toggle-btn').forEach(function(btn) {\n    btn.addEventListener('click', function(e) {\n      e.preventDefault();\n      e.stopPropagation();\n      var val = this.getAttribute('data-val');\n      var row = this.closest('[data-tf]');\n      var id  = row.getAttribute('data-tf');\n      tfValues[id] = val;\n      document.getElementById(id).value = val;\n      row.querySelectorAll('.toggle-btn').forEach(function(b) {\n        b.classList.remove('active-T', 'active-F');\n      });\n      this.classList.add('active-' + val);\n    });\n  });\n\n  // ── Checkbox items (using div, not label, to avoid double-fire) ───────────\n  function bindCheckItems() {\n    document.querySelectorAll('.check-item').forEach(function(item) {\n      item.addEventListener('click', function() {\n        var cb = this.querySelector('input[type=\"checkbox\"]');\n        cb.checked = !cb.checked;\n        this.classList.toggle('checked', cb.checked);\n      });\n      item.addEventListener('keydown', function(e) {\n        if (e.key === ' ' || e.key === 'Enter') {\n          e.preventDefault();\n          this.click();\n        }\n      });\n    });\n  }\n  bindCheckItems();\n\n  // ── Helpers ───────────────────────────────────────────────────────────────\n  function getCheckedFUD() {\n    var items = Array.from(document.querySelectorAll('input[name=\"fud\"]:checked'));\n    return items.map(function(cb) { return cb.value; }).join('\\n• ');\n  }\n\n  function validate() {\n    var ok = true;\n    ['firstName', 'lastName'].forEach(function(id) {\n      var el = document.getElementById(id);\n      if (!el.value.trim()) { el.classList.add('error'); ok = false; }\n      else { el.classList.remove('error'); }\n    });\n    return ok;\n  }\n\n  function buildEmailBody(data) {\n    var fud = data.fud ? '• ' + data.fud : 'None selected';\n    return 'DOXA FRANCHISE - CANDIDATE READINESS GUIDE\\n'\n      + '===========================================\\n'\n      + 'Submitted: ' + new Date().toLocaleString() + '\\n\\n'\n      + 'Name:     ' + data.firstName + ' ' + data.lastName + '\\n\\n'\n      + 'Q1 - Closed the door on employment?\\n' + (data.q1 || '[No response]') + '\\n\\n'\n      + 'Q2 - Driving desire for ownership?\\n' + (data.q2 || '[No response]') + '\\n\\n'\n      + 'Q3 - Comfortable being early?\\n'\n      + '  Statement 1: ' + (data.tf1 || '[Not answered]') + '\\n'\n      + '  Statement 2: ' + (data.tf2 || '[Not answered]') + '\\n'\n      + '  Statement 3: ' + (data.tf3 || '[Not answered]') + '\\n\\n'\n      + 'Q4 - Financial runway?\\n' + (data.q4 || '[No response]') + '\\n\\n'\n      + 'Q5 - Support system?\\n' + (data.q5 || '[No response]') + '\\n\\n'\n      + 'Q6 - What has been in the way?\\n' + fud;\n  }\n\n  function showStatus(msg, type) {\n    var el = document.getElementById('statusMsg');\n    el.textContent = msg;\n    el.className = 'status-msg ' + type;\n  }\n\n  function clearStatus() {\n    var el = document.getElementById('statusMsg');\n    el.className = 'status-msg';\n    el.textContent = '';\n  }\n\n  // ── CRM submission — Zapier webhook (preferred) or direct CT API ────────────\n  function submitToCRM(data) {\n    // ── Route 1: Zapier webhook (no CORS issues, recommended) ────────────────\n    if (CONFIG.ZAPIER_WEBHOOK && CONFIG.ZAPIER_WEBHOOK.trim().length > 0) {\n      var zapPayload = {\n        firstName:    data.firstName,\n        lastName:     data.lastName,\n        q1:           data.q1  || '',\n        q2:           data.q2  || '',\n        tf1:          data.tf1 || '',\n        tf2:          data.tf2 || '',\n        tf3:          data.tf3 || '',\n        q4:           data.q4  || '',\n        q5:           data.q5  || '',\n        fud:          data.fud || '',\n        notes:        buildEmailBody(data),\n        source:       'DOXA Candidate Readiness Form',\n        submitted_at: new Date().toISOString(),\n        action_plan_id:  CONFIG.CT_ACTION_PLAN_ID  || '',\n        lead_source_id:  CONFIG.CT_LEAD_SOURCE_ID  || '',\n      };\n      return fetch(CONFIG.ZAPIER_WEBHOOK, {\n        method: 'POST',\n        headers: { 'Content-Type': 'application/json' },\n        body: JSON.stringify(zapPayload),\n      }).then(function(r) {\n        if (!r.ok) throw new Error('Zapier webhook returned ' + r.status);\n        return r;\n      });\n    }\n\n    // ── Route 2: Direct ClientTether API (requires CT CORS to be enabled) ────\n    var payload = {\n      firstName: data.firstName,\n      lastName:  data.lastName,\n      whiteboard: buildEmailBody(data),\n      new_lead_notification: '2',\n      contact_type: '1',\n    };\n    if (CONFIG.CT_ACTION_PLAN_ID) payload.action_plan_id = CONFIG.CT_ACTION_PLAN_ID;\n    if (CONFIG.CT_LEAD_SOURCE_ID) payload.lead_source_id = CONFIG.CT_LEAD_SOURCE_ID;\n\n    return fetch('https://api.clienttether.com/v2/api/create_client', {\n      method: 'POST',\n      headers: {\n        'Content-Type':   'application/json',\n        'x-access-token': CONFIG.CT_ACCESS_TOKEN,\n        'x-web-key':      CONFIG.CT_WEB_KEY,\n      },\n      body: JSON.stringify(payload),\n    }).then(function(r) { return r.json(); })\n      .then(function(json) {\n        if (json.ResultCode !== 'CT200' && json.ResultCode !== 'CT_200') {\n          throw new Error('ClientTether: ' + (json.Message || 'Unknown error'));\n        }\n        return json;\n      });\n  }\n\n  // ── EmailJS send ──────────────────────────────────────────────────────────\n  function sendEmail(data) {\n    var fud = data.fud ? '• ' + data.fud : 'None selected';\n    return emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, {\n      to_email:     CONFIG.TO_EMAIL,\n      from_name:    data.firstName + ' ' + data.lastName,\n      q1:           data.q1  || '[No response]',\n      q2:           data.q2  || '[No response]',\n      tf1:          data.tf1 || '[Not answered]',\n      tf2:          data.tf2 || '[Not answered]',\n      tf3:          data.tf3 || '[Not answered]',\n      q4:           data.q4  || '[No response]',\n      q5:           data.q5  || '[No response]',\n      fud:          fud,\n      submitted_at: new Date().toLocaleString(),\n    });\n  }\n\n  // ── Form submit ───────────────────────────────────────────────────────────\n  document.getElementById('readinessForm').addEventListener('submit', function(e) {\n    e.preventDefault();\n\n    if (!validate()) {\n      showStatus('Please fill in the required fields marked with *.', 'error-msg');\n      return;\n    }\n\n    var btn = document.getElementById('submitBtn');\n    btn.disabled = true;\n    btn.innerHTML = 'Submitting... <span class=\"arrow\">&#x23F3;<\u002Fspan>';\n    clearStatus();\n\n    var data = {\n      firstName: document.getElementById('firstName').value.trim(),\n      lastName:  document.getElementById('lastName').value.trim(),\n      q1:        document.getElementById('q1').value.trim(),\n      q2:        document.getElementById('q2').value.trim(),\n      tf1:       tfValues.tf1,\n      tf2:       tfValues.tf2,\n      tf3:       tfValues.tf3,\n      q4:        document.getElementById('q4').value.trim(),\n      q5:        document.getElementById('q5').value.trim(),\n      fud:       getCheckedFUD(),\n    };\n\n    var tasks = [];\n\n    if (CONFIG.EMAILJS_PUBLIC_KEY && CONFIG.EMAILJS_PUBLIC_KEY.trim().length > 0) {\n      if (typeof emailjs !== 'undefined') {\n        tasks.push(\n          sendEmail(data).catch(function(err) {\n            console.error('EmailJS error:', err);\n            return { _error: 'Email: ' + err.message };\n          })\n        );\n      } else {\n        console.warn('EmailJS library not available - skipping email send');\n      }\n    }\n\n    // Demo/preview mode — no keys set yet, still show success\n    if (tasks.length === 0) {\n      showSuccess();\n      return;\n    }\n\n    Promise.all(tasks).then(function(results) {\n      btn.disabled = false;\n      btn.innerHTML = 'Submit My Answers <span class=\"arrow\">&#x2192;<\u002Fspan>';\n\n      var errors = results\n        .filter(function(r) { return r && r._error; })\n        .map(function(r) { return r._error; });\n\n      if (errors.length === 0) {\n        showSuccess();\n      } else {\n        showStatus(\n          'There was an issue: ' + errors.join('; ') +\n          '. Please try again or email franchise[at]doxatalent.com directly.',\n          'error-msg'\n        );\n      }\n    });\n  });\n\n  function showSuccess() {\n    document.getElementById('readinessForm').style.display = 'none';\n    document.getElementById('successScreen').style.display = 'block';\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
